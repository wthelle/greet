<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>These are for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="frame frame-page-2">
    <main class="page page-2">
      <h1 class="title title-sm">These are for you 💖</h1>

      <div class="choice-buttons">
        <a href="images.html" id="images-btn" class="btn btn-icon" aria-label="Open images">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- back photo -->
            <rect x="18" y="14" width="44" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
            <!-- front photo -->
            <rect x="10" y="22" width="44" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
            <!-- heart -->
            <path d="M32 36 C32 32 36 30 38 33 C40 30 44 32 44 36 C44 42 38 46 38 46 C38 46 32 42 32 36Z" fill="currentColor"/>
          </svg>
        </a>

        <a href="message.html" id="message-btn" class="btn btn-icon" aria-label="Open message">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- back bubble -->
            <path d="M48 18 H68 A6 6 0 0 1 74 24 V42 A6 6 0 0 1 68 48 H58 L52 56 V48 H48 A6 6 0 0 1 42 42 V24 A6 6 0 0 1 48 18 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
            <!-- front bubble -->
            <path d="M12 28 H48 A6 6 0 0 1 54 34 V52 A6 6 0 0 1 48 58 H30 L22 68 V58 H12 A6 6 0 0 1 6 52 V34 A6 6 0 0 1 12 28 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
            <!-- dots -->
            <circle cx="24" cy="43" r="2.5" fill="currentColor"/>
            <circle cx="32" cy="43" r="2.5" fill="currentColor"/>
            <circle cx="40" cy="43" r="2.5" fill="currentColor"/>
          </svg>
        </a>
      </div>

      <p class="subtitle">Curious? 🤭 Pick which one you want to open first!</p>
    </main>
  </div>
  <script src="audio.js"></script>
</body>
</html>
